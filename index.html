<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kobrain — Your AI Teammate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #1A5F5F;
      --primary-dark: #134545;
      --accent: #B85C38;
      --bg: #F4F2EE;
      --bg-card: #FFFFFF;
      --text: #1A1A1A;
      --text-light: #5C5C5C;
      --text-muted: #909090;
      --border: #D8D4CE;
      --border-dark: #BEBAB4;
      --white: #FFFFFF;
    }
    
    html { scroll-behavior: smooth; }
    
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    img { max-width: 100%; display: block; }
    
    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5%;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    
    .logo-icon { width: 32px; height: 32px; }
    
    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    
    .nav-links a {
      text-decoration: none;
      color: var(--text-light);
      font-weight: 500;
      font-size: 0.875rem;
      letter-spacing: 0.01em;
      transition: color 0.15s;
    }
    
    .nav-links a:hover { color: var(--text); }
    
    .btn {
      background: var(--primary);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: background 0.15s;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.01em;
    }
    
    .btn:hover { background: var(--primary-dark); }
    
    .btn-accent { background: var(--accent); }
    .btn-accent:hover { background: #9A4D2E; }
    
    .btn-outline {
      background: transparent;
      border: 2px solid var(--text);
      color: var(--text);
    }
    
    .btn-outline:hover {
      background: var(--text);
      color: var(--white);
    }
    
    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 5% 64px;
      max-width: 880px;
      margin: 0 auto;
    }
    
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -0.025em;
      color: var(--text);
    }
    
    .hero h1 span { color: var(--primary); }
    
    .hero-sub {
      font-size: 1.125rem;
      color: var(--text-light);
      max-width: 640px;
      margin: 0 auto 32px;
      line-height: 1.7;
    }
    
    .waitlist-form {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    
    .waitlist-form input {
      padding: 11px 16px;
      border: 2px solid var(--border);
      border-radius: 4px;
      font-size: 1rem;
      width: 264px;
      font-family: inherit;
      background: var(--white);
      color: var(--text);
      transition: border-color 0.15s;
    }
    
    .waitlist-form input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .waitlist-form input::placeholder { color: var(--text-muted); }
    
    .waitlist-question {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 16px;
    }
    
    .waitlist-question textarea {
      width: 100%;
      max-width: 480px;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.875rem;
      resize: none;
      margin-top: 8px;
      background: var(--white);
      color: var(--text);
    }
    
    .waitlist-question textarea::placeholder { color: var(--text-muted); }
    
    /* INTEGRATIONS CAROUSEL */
    .integrations {
      padding: 48px 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    
    .integrations-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 32px;
    }
    
    .carousel {
      display: flex;
      gap: 48px;
      animation: scroll 30s linear infinite;
      width: max-content;
    }
    
    .carousel:hover { animation-play-state: paused; }
    
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    
    .carousel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-light);
      white-space: nowrap;
      opacity: 0.65;
      transition: opacity 0.2s;
    }
    
    .carousel-item:hover { opacity: 1; }
    
    .carousel-item svg { width: 28px; height: 28px; }
    
    /* FEATURES */
    .features {
      padding: 80px 5%;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .section-title {
      text-align: center;
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    
    .section-sub {
      text-align: center;
      color: var(--text-light);
      font-size: 1rem;
      max-width: 560px;
      margin: 0 auto 56px;
      line-height: 1.65;
    }
    
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    
    .feature-card {
      background: var(--bg-card);
      border-radius: 4px;
      padding: 28px;
      border: 1px solid var(--border);
    }
    
    .feature-card:hover {
      border-color: var(--primary);
    }
    
    .feature-icon {
      width: 44px;
      height: 44px;
      background: var(--bg);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    
    .feature-icon svg {
      width: 22px;
      height: 22px;
      color: var(--primary);
    }
    
    .feature-card h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    
    .feature-card p {
      color: var(--text-light);
      font-size: 0.875rem;
      line-height: 1.65;
    }
    
    /* HOW IT WORKS */
    .how-it-works {
      padding: 80px 5%;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    
    .steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 48px;
      max-width: 960px;
      margin: 0 auto;
    }
    
    .step { text-align: center; }
    
    .step-num {
      width: 52px;
      height: 52px;
      background: var(--primary);
      color: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.125rem;
      font-weight: 800;
      margin: 0 auto 20px;
    }
    
    .step h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    
    .step p {
      color: var(--text-light);
      font-size: 0.875rem;
      line-height: 1.65;
    }
    
    /* USE CASES */
    .use-cases {
      padding: 80px 5%;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .use-case-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    
    .use-case {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px;
    }
    
    .use-case h3 {
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      color: var(--primary);
    }
    
    .use-case p {
      color: var(--text-light);
      font-size: 0.875rem;
      line-height: 1.65;
    }
    
    /* PRICING */
    .pricing {
      padding: 80px 5%;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      max-width: 960px;
      margin: 0 auto;
    }
    
    .pricing-card {
      background: var(--bg-card);
      border-radius: 4px;
      padding: 32px;
      text-align: center;
      border: 1px solid var(--border);
      transition: border-color 0.15s;
    }
    
    .pricing-card.popular {
      border-color: var(--primary);
      border-width: 2px;
    }
    
    .pricing-card h3 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    
    .price {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.025em;
      margin-bottom: 4px;
    }
    
    .price span {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
    }
    
    .pricing-desc {
      color: var(--text-muted);
      font-size: 0.8125rem;
      margin-bottom: 24px;
    }
    
    .pricing-features { text-align: left; margin-bottom: 28px; }
    
    .pricing-features li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      font-size: 0.875rem;
      color: var(--text);
    }
    
    .pricing-features li svg {
      width: 16px;
      height: 16px;
      color: var(--primary);
      flex-shrink: 0;
    }
    
    /* FAQ */
    .faq {
      padding: 80px 5%;
      max-width: 760px;
      margin: 0 auto;
    }
    
    .faq-item {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
    }
    
    .faq-item:first-of-type {
      border-top: 1px solid var(--border);
    }
    
    .faq-item h3 {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    
    .faq-item p {
      color: var(--text-light);
      font-size: 0.875rem;
      line-height: 1.65;
    }
    
    /* CTA */
    .cta {
      padding: 80px 5%;
      background: var(--text);
      text-align: center;
    }
    
    .cta h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
      color: var(--white);
    }
    
    .cta p {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 32px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .cta .btn {
      background: var(--white);
      color: var(--text);
      font-size: 0.9375rem;
      padding: 13px 28px;
    }
    
    .cta .btn:hover { background: #F0EFED; }
    
    /* FOOTER */
    footer {
      padding: 24px 5%;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8125rem;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    
    /* RESPONSIVE */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hero { padding: 56px 5% 48px; }
      .section-title { font-size: 1.5rem; }
      .waitlist-form input { width: 100%; }
    }


</head>

    </p>

      </div>
      
      <div class="step">
        <div class="step-num">2</div>
        <h3>Delegate by Email</h3>
        <p>Send an email to your Kobrain. CC them on tasks. Loop them into threads. They'll read it, understand what you need, and get to work — using your actual tools.</p>

      <div class="step">
        <div class="step-num">3</div>
        <h3>Wake Up to Done Work</h3>

    </div>

  <!-- FAQ -->
  <section class="faq" id="faq">
    <h2 class="section-title">Questions?</h2>
    
    <div class="faq-item">
      <h3>What makes Kobrain different from ChatGPT or Claude?</h3>
      <p>Those are chatbots. Kobrain is a teammate — with its own email, its own memory, and access to your real tools. You delegate work via email. It does the work and emails you back. It's persistent, remembers everything, and operates in your actual workflow — not a chat window.</p>
    </div>
    
    <div class="faq-item">
      <h3>Can it really code and use GitHub?</h3>
      <p>Yes. Kobrain connects to GitHub, Vercel, Supabase, and other developer tools. It can write code, review pull requests, push commits, and manage deployments. It works like a developer teammate who has access to your entire stack.</p>
    </div>
    
    <div class="faq-item">
      <h3>What if it makes a mistake?</h3>
      <p>Kobrain sends you updates before taking big actions. You set the boundaries — what it can do autonomously and what needs your approval. Like any teammate, you manage by outcomes, not micromanagement.</p>
    </div>
    
    <div class="faq-item">
      <h3>Is my data secure?</h3>
      <p>Kobrain operates within the integrations you authorize. It only has access to what you grant it. You can revoke access at any time. Your data is encrypted and we never use it to train models.</p>
    </div>
    
    <div class="faq-item">
      <h3>When can I get started?</h3>
      <p>We're currently building. Join the waitlist and we'll notify you when early access opens. Early members get priority onboarding and founding member pricing.</p>
    </div>
  </section>
